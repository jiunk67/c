<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>举报打手</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 返回上一页按钮 */
        .back-button {
            position: fixed;
            top: 10px;
            left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            z-index: 1001;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            transform: scale(1.1);
            background-color: rgba(255, 255, 255, 0.15);
        }
        
        .back-button::before {
            content: '';
            width: 12px;
            height: 12px;
            border-left: 2px solid #fff;
            border-top: 2px solid #fff;
            transform: rotate(-45deg);
            margin-right: 2px;
        }
        
        /* 服务器连接状态 */
        .server-status {
            position: fixed;
            top: 10px;
            left: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            z-index: 1001;
            font-size: 10px;
            font-weight: bold;
            color: #fff;
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #4CAF50;
            animation: pulse 2s infinite;
        }

        .server-status.offline {
            color: #f44336;
        }

        .server-status.offline .status-indicator {
            background-color: #f44336;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- 返回上一页按钮 -->
    <div class="back-button" onclick="goBack()"></div>
    
    <!-- 服务器连接状态 -->
    <div class="server-status" id="server-status">
        <span class="status-indicator"></span>
        <span class="status-text">服务器，连接成功</span>
    </div>
    
    <div class="payment-container">
        <h1>举报打手</h1>
        <p>请在下方输入您要举报的内容</p>
        
        <div class="form-container">
            <form id="report-form">
                <div class="form-group">
                    <label for="report-content">举报内容：</label>
                    <textarea id="report-content" name="report-content" placeholder="请详细描述您要举报的内容" rows="10" required></textarea>
                </div>
                
                <style>
                    /* 响应式设计 */
                    @media (max-width: 768px) {
                        .payment-container {
                            padding: 20px 15px;
                        }
                        
                        .form-container {
                            padding: 20px 15px;
                        }
                        
                        .form-group textarea {
                            width: 100%;
                            padding: 10px;
                            font-size: 16px;
                        }
                        
                        .btn {
                            padding: 12px 24px;
                            font-size: 16px;
                        }
                    }
                </style>
                
                <button type="submit" class="btn btn-submit">提交</button>
            </form>
            
            <div id="message"></div>
        </div>
        
    </div>
    <script>
        // 返回上一页
        function goBack() {
            window.history.back();
        }
    </script>
    <script src="js/script.js"></script>
</body>
</html>
