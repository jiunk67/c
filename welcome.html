<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮木俱乐部 - 欢迎</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 欢迎页面专用样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: #1a1a2e;
            color: white;
            overflow-x: hidden;
        }
        
        .welcome-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* 背景动画 */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .bg-animation .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-50px) rotate(180deg);
            }
        }
        
        /* 返回上一页按钮 */
        .back-button {
            position: fixed;
            top: 10px;
            left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            z-index: 1001;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            transform: scale(1.1);
            background-color: rgba(255, 255, 255, 0.15);
        }
        
        .back-button::before {
            content: '';
            width: 12px;
            height: 12px;
            border-left: 2px solid #fff;
            border-top: 2px solid #fff;
            transform: rotate(-45deg);
            margin-right: 2px;
        }
        
        /* 服务器状态 */
        .server-status {
            position: fixed;
            top: 10px;
            left: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            z-index: 1001;
            font-size: 10px;
            font-weight: bold;
            color: #fff;
        }
        
        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #4CAF50;
            animation: pulse 2s infinite;
        }
        
        .server-status.offline {
            color: #f44336;
        }
        
        .server-status.offline .status-indicator {
            background-color: #f44336;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        /* 主内容 */
        .welcome-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            padding: 100px 20px 20px;
            position: relative;
        }
        
        .welcome-content {
            max-width: 800px;
            z-index: 10;
        }
        
        .welcome-title {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #4ecdc4;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.6);
        }
        
        .welcome-subtitle {
            font-size: 1.5rem;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }
        
        /* 按钮容器 */
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 60px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            min-width: 150px;
            text-align: center;
        }
        
        .btn-primary {
            background: #ff6b6b;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }
        
        .btn-secondary {
            background: #4ecdc4;
            color: white;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.4);
        }
        
        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.6);
        }
        
        .btn-tertiary {
            background: #a8e6cf;
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(168, 230, 207, 0.4);
        }
        
        .btn-tertiary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(168, 230, 207, 0.6);
        }
        
        .btn-quaternary {
            background: #ffd93d;
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(255, 217, 61, 0.4);
        }
        
        .btn-quaternary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 217, 61, 0.6);
        }
        

        
        /* 底部信息 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }
        
        .footer p {
            margin: 0;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .welcome-title {
                font-size: 2.5rem;
            }
            
            .welcome-subtitle {
                font-size: 1.2rem;
            }
            
            .button-container {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 200px;
            }
        }
        
        /* 加载动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader-circle {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid #4ecdc4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 磨砂玻璃弹窗样式 */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.5s ease;
        }
        
        .popup-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 15px;
            max-width: 80%;
            max-height: 80%;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease;
        }
        
        .popup-content h2 {
            color: #4ecdc4;
            margin-top: 0;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .popup-content p {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        
        .popup-content .close-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: rgba(78, 205, 196, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.5;
            pointer-events: none;
        }
        
        .popup-content .close-btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .popup-content .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.4);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loader">
        <div class="loader-circle"></div>
    </div>
    
    <!-- 背景动画 -->
    <div class="bg-animation" id="bg-animation"></div>
    
    <!-- 返回上一页按钮 -->
    <div class="back-button" onclick="goBack()"></div>
    
    <!-- 服务器连接状态 -->
    <div class="server-status" id="server-status">
        <span class="status-indicator"></span>
        <span class="status-text">服务器，连接成功</span>
    </div>
    
    <!-- 主内容 -->
    <div class="welcome-container">
        <div class="welcome-content">
            <h1 class="welcome-title">浮木俱乐部</h1>
            <p class="welcome-subtitle">专业游戏服务平台，为您提供优质的游戏体验。
            我们拥有经验丰富的打手团队，为您提供安全、高效的游戏代练服务。</p>
            
            <div class="button-container">
                <a href="payment.html" class="btn btn-primary">立即付款</a>
                <a href="projects.html" class="btn btn-secondary">开始点单</a>
                <a href="join.html" class="btn btn-tertiary">加入我们</a>
                <a href="report.html" class="btn btn-quaternary">举报打手</a>
            </div>
        </div>
        

    </div>
    
    <!-- 底部信息 -->
    <div class="footer">
        <p>&copy; 2026 浮木俱乐部 版权所有 | QQ群：217191046</p>
    </div>
    
    <!-- 点单步骤提示弹窗 -->
    <div class="popup-overlay" id="order-popup">
        <div class="popup-content">
            <h2>点单步骤</h2>
            <p>1. 点击"开始点单"按钮</p>
            <p>2. 提交订单之后等待打手邀请</p>
            <p>3. 询问哪一个收款码是他本人</p>
            <p>4. 进行付款确认后完成订单</p>
            <button class="close-btn" id="close-popup-btn" onclick="closeOrderPopup()">我知道了</button>
        </div>
    </div>
    
    <script>
        // 页面加载完成后隐藏加载动画并显示点单步骤弹窗
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.querySelector('.loader').classList.add('hidden');
                // 显示点单步骤弹窗
                document.getElementById('order-popup').style.display = 'flex';
                // 3秒后激活关闭按钮
                setTimeout(function() {
                    document.getElementById('close-popup-btn').classList.add('active');
                }, 3000);
            }, 1000);
        });
        
        // 创建背景粒子动画
        function createParticles() {
            const container = document.getElementById('bg-animation');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // 随机大小
                const size = Math.random() * 10 + 5;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                // 随机位置
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                
                // 随机动画延迟和持续时间
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                
                container.appendChild(particle);
            }
        }
        
        // 初始化背景粒子
        createParticles();
        
        // 服务器状态检测
        function checkServerStatus() {
            const statusElement = document.getElementById('server-status');
            const statusText = statusElement.querySelector('.status-text');
            
            // 模拟服务器状态检测
            setTimeout(function() {
                // 这里可以添加实际的服务器状态检测逻辑
                statusText.textContent = '服务器，连接成功';
                statusElement.classList.remove('offline');
            }, 1000);
        }
        
        // 初始化服务器状态检测
        checkServerStatus();
        
        // 关闭点单步骤弹窗
        function closeOrderPopup() {
            document.getElementById('order-popup').style.display = 'none';
        }
        
        // 返回上一页
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
